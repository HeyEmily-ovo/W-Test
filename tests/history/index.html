<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你是哪个历史人物？—— 人格特质测试</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body class="wt-has-nav">
<nav class="wt-nav">
    <a href="../../index.html">← 返回测试集合</a>
    <span style="color:rgba(255,255,255,0.2);">|</span>
    <span class="wt-nav-logo">W-Test</span>
</nav>

<!-- ===== LANDING ===== -->
<section class="landing" id="landing">
  <div class="landing-icon">🏯</div>
  <h1>你是哪个历史人物？</h1>
  <p class="subtitle">基于大五人格科学的 50 题深度测试，融合情境选择题与自评量表，还原你的人格画像，找到跨越千年的灵魂共鸣者。</p>
  <div class="features">
    <div class="feature">
      <div class="feat-icon">🎯</div>
      <div class="feat-text">五维人格分析</div>
    </div>
    <div class="feature">
      <div class="feat-icon">📊</div>
      <div class="feat-text">多维雷达图</div>
    </div>
    <div class="feature">
      <div class="feat-icon">👤</div>
      <div class="feat-text">多位历史人物</div>
    </div>
  </div>
  <button class="btn btn-primary" onclick="startTest()">开始测试 →</button>
  <div style="margin-top:14px;display:flex;gap:10px;justify-content:center;">
    <button class="btn btn-secondary btn-sm" onclick="showEncyclopedia()">📖 人物图鉴</button>
    <button class="btn btn-secondary btn-sm" onclick="showHistory()">📋 历史记录</button>
  </div>
  <p class="start-hint">约需 8 分钟</p>
</section>

<!-- ===== TEST ===== -->
<section class="test" id="test">
  <div class="test-header">
    <h3>答题进度</h3>
    <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">0 / 50</div>
  </div>
  <div class="question-card" id="questionCard">
    <div class="q-number" id="qNumber"></div>
    <div class="q-text" id="qText"></div>
    <div class="q-hint" id="qHint"></div>
    <div class="options" id="options"></div>
  </div>

  <div class="q-nav">
    <button class="btn btn-secondary btn-sm" id="btnPrev" onclick="prevQuestion()" disabled>← 上一题</button>
    <button class="btn btn-secondary btn-sm" id="btnNext" onclick="nextQuestion()">下一题 →</button>
  </div>

  <div class="q-tabs-wrap">
    <div class="tabs-label">题目导航（点击跳转）</div>
    <div class="q-tabs" id="qTabs"></div>
  </div>
</section>

<!-- ===== RESULTS ===== -->
<section class="results" id="results">
  <div class="result-hero">
    <div class="badge">测试完成</div>
    <h2>你的人格画像</h2>
  </div>

  <div class="figure-card" id="topFigure"></div>

  <div class="chart-section">
    <h3>五维人格雷达图</h3>
    <div class="chart-box"><div id="radarChart"></div></div>
  </div>

  <div class="chart-section">
    <h3>维度得分对比</h3>
    <div class="chart-box"><div id="barChart"></div></div>
  </div>

  <div class="chart-section">
    <h3>各维度深度解读</h3>
    <div class="dim-analysis" id="dimAnalysis"></div>
  </div>

  <div class="other-matches">
    <h3>备选匹配人物</h3>
    <div class="other-grid" id="otherMatches"></div>
  </div>

  <div class="share-section">
    <button class="btn btn-primary" onclick="shareResult()">📋 复制结果分享</button>
  </div>
  <div class="share-section" style="margin-top:8px;">
    <button class="btn btn-secondary btn-sm" onclick="showHistory()" style="margin:0 6px;">📋 历史记录</button>
    <button class="btn btn-secondary btn-sm" onclick="showEncyclopedia()" style="margin:0 6px;">📖 人物图鉴</button>
  </div>

  <div class="retake">
    <button class="btn btn-secondary btn-sm" onclick="retakeTest()">🔄 重新测试</button>
  </div>
</section>

<!-- ===== 历史记录页 ===== -->
<section class="history-page" id="historyPage" style="display:none;">
  <div style="max-width:700px;margin:0 auto;padding:2rem 1.5rem;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
      <h2 style="font-size:1.5rem;color:var(--primary);">📋 测试历史记录</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary btn-sm" onclick="clearHistory()" style="color:#D04040;border-color:#FFD0D0;">🗑 清空</button>
        <button class="btn btn-secondary btn-sm" onclick="backToLanding()">← 返回首页</button>
      </div>
    </div>
    <div id="historyList"></div>
    <div id="historyEmpty" style="display:none;text-align:center;padding:60px 20px;color:#888;">
      <div style="font-size:64px;">📭</div>
      <p style="font-size:1.1rem;margin:16px 0;">还没有测试记录</p>
      <button class="btn btn-primary" onclick="backToLanding();startTest();">开始第一次测试</button>
    </div>
  </div>
</section>

<!-- ===== 人物图鉴页 ===== -->
<section class="encyclopedia-page" id="encyclopediaPage" style="display:none;">
  <div style="max-width:900px;margin:0 auto;padding:2rem 1.5rem;">
    <div style="text-align:center;margin-bottom:32px;position:relative;">
      <button class="btn btn-secondary btn-sm" onclick="backToLanding()" style="position:absolute;left:0;top:0;">← 返回</button>
      <h2 style="font-size:2rem;font-weight:900;color:var(--primary);">📖 历史人物图鉴</h2>
      <p style="color:var(--text-secondary);margin-top:8px;">点击人物卡片查看详细档案 · 共16位历史人物</p>
    </div>
    <div class="other-grid" id="figureGallery"></div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
