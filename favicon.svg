<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C5CFC"/>
      <stop offset="100%" style="stop-color:#4B2FD0"/>
    </linearGradient>
  </defs>
  <!-- 圆角方形背景 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- 大脑图标 -->
  <g transform="translate(256,248)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- 左半球轮廓 -->
    <path d="M-10,-130 C-90,-130 -155,-60 -155,25 C-155,90 -105,135 -55,143 C-30,147 -15,135 -10,118" stroke-width="26"/>
    <!-- 右半球轮廓 -->
    <path d="M10,-130 C90,-130 155,-60 155,25 C155,90 105,135 55,143 C30,147 15,135 10,118" stroke-width="26"/>
    <!-- 中央沟 -->
    <line x1="0" y1="-124" x2="0" y2="110" stroke-width="18"/>
    <!-- 左脑回 -->
    <path d="M-50,-100 C-80,-75 -125,-40 -138,10" stroke-width="16"/>
    <path d="M-45,-30 C-70,-15 -100,15 -115,55" stroke-width="16"/>
    <path d="M-35,40 C-55,55 -80,75 -90,100" stroke-width="12"/>
    <!-- 右脑回 -->
    <path d="M50,-100 C80,-75 125,-40 138,10" stroke-width="16"/>
    <path d="M45,-30 C70,-15 100,15 115,55" stroke-width="16"/>
    <path d="M35,40 C55,55 80,75 90,100" stroke-width="12"/>
    <!-- 底部脑干 -->
    <path d="M-12,118 C-12,140 -12,155 0,162 C12,155 12,140 12,118" stroke-width="16"/>
  </g>
</svg>
