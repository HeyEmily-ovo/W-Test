<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C5CFC"/>
      <stop offset="100%" style="stop-color:#4B2FD0"/>
    </linearGradient>
  </defs>
  <!-- 圆角方形背景 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- 双翼图标 -->
  <g transform="translate(256,268)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- 左翼主体 -->
    <path d="M-8,-10 C-30,-140 -170,-170 -200,-60 C-210,-20 -205,20 -195,50" stroke-width="24"/>
    <!-- 左翼羽毛层次 -->
    <path d="M-40,-80 C-90,-130 -160,-120 -190,-40" stroke-width="16"/>
    <path d="M-55,-30 C-105,-50 -155,-30 -185,10" stroke-width="14"/>
    <path d="M-50,20 C-95,15 -140,30 -180,50" stroke-width="12"/>

    <!-- 右翼主体 -->
    <path d="M8,-10 C30,-140 170,-170 200,-60 C210,-20 205,20 195,50" stroke-width="24"/>
    <!-- 右翼羽毛层次 -->
    <path d="M40,-80 C90,-130 160,-120 190,-40" stroke-width="16"/>
    <path d="M55,-30 C105,-50 155,-30 185,10" stroke-width="14"/>
    <path d="M50,20 C95,15 140,30 180,50" stroke-width="12"/>

    <!-- 中央菱形核心 -->
    <path d="M0,-24 L14,0 L0,24 L-14,0 Z" fill="#ffffff" stroke="none"/>
  </g>
</svg>
